name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.15.1

      - name: Install dependencies
        run: shards install

      - name: Run ameba linter
        run: |
          if [ -f bin/ameba ]; then
            ./bin/ameba
          else
            shards install && ./bin/ameba
          fi

      - name: Run tests
        run: crystal spec

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.15.1

      - name: Build
        run: |
          shards install --without development
          crystal build src/searxng_web_fetch_mcp.cr --release
